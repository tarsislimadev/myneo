services:
  neo4j:
    image: neo4j:latest
    ports:
      - "7474:7474" # Neo4j Browser (HTTP)
      - "7473:7473" # Neo4j Browser (HTTPS)
      - "7687:7687" # Bolt protocol (drivers)
    environment:
      - NEO4J_AUTH=neo4j/test12345 # username: neo4j, password: test12345
      - NEO4J_PLUGINS=["apoc"] # Enable APOC plugin for better browser features
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
    volumes:
      - ./neo4j_data:/data # persistent database storage
      - ./neo4j_logs:/logs # logs
      - ./neo4j_import:/import # import directory for CSVs
      - ./neo4j_plugins:/plugins # plugins/extensions
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

